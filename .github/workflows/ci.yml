name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  e2e-accessibility:
    name: E2E & Accessibility (public routes)
    runs-on: ubuntu-latest
    needs: quality

    # Real secrets (from repo Settings → Secrets) are used when available.
    # Placeholder fallbacks let the server boot in forks or repos where secrets
    # are not yet configured — the public E2E tests never perform real auth, so
    # the SDK only needs to initialise, not contact Auth0.
    env:
      AUTH0_SECRET: ${{ secrets.AUTH0_SECRET || 'ci-placeholder-secret-32-characters!!' }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN || 'placeholder.auth0.com' }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID || 'ci-placeholder-client-id' }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET || 'ci-placeholder-client-secret' }}
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE || 'https://placeholder-api' }}
      APP_BASE_URL: "http://localhost:3000"
      # Skip the authenticated calendar tests in CI — they need real credentials.
      # Public project (smoke + TCG + axe) runs unconditionally.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run public e2e tests (includes axe accessibility scans)
        run: npx playwright test --project=public

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
