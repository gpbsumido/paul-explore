name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  e2e-accessibility:
    name: E2E & Accessibility (public routes)
    runs-on: ubuntu-latest
    needs: quality

    # These secrets are required to boot the Next.js dev server (Auth0 middleware
    # initialises at startup even for public routes). Set them in repo Settings →
    # Secrets. The e2e tests themselves only cover public routes — no real auth
    # credentials are needed.
    env:
      AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      AUTH0_BASE_URL: "http://localhost:3000"
      # Skip the authenticated calendar tests in CI — they need real credentials.
      # Public project (smoke + TCG + axe) runs unconditionally.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run public e2e tests (includes axe accessibility scans)
        run: npx playwright test --project=public

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
